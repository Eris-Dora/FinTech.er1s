<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIN TEX AI — Premium FinTech Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        obsidian: '#0D0E11',
                        slateDark: '#16181F',
                        emeraldNeon: '#00E676',
                        goldPremium: '#D4AF37',
                        platinum: '#E5E4E2',
                        glassBorder: 'rgba(255, 255, 255, 0.08)'
                    },
                    fontFamily: {
                        sans: ['SF Pro Display', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: linear-gradient(135deg, rgba(22, 24, 31, 0.7) 0%, rgba(13, 14, 17, 0.8) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid var(--tw-colors-glassBorder);
        }
        .tap-active:active { transform: scale(0.97); transition: transform 0.1s ease-out; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        @keyframes pulse-slow { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.4; } }
        .animate-pulse-slow { animation: pulse-slow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .ai-float-chat-btn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 50;
        }
        .chat-modal {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 360px;
            height: 500px;
            z-index: 51;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 230, 118, 0.2);
        }
    </style>
</head>
<body class="bg-obsidian text-white font-sans antialiased selection:bg-emeraldNeon/30 select-none overflow-x-hidden">

    <!-- Telegram Mini App Container -->
    <div class="max-w-md mx-auto min-h-screen px-4 pt-3 pb-8 flex flex-col justify-between">
        
        <!-- HEADER -->
        <header class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-goldPremium to-platinum p-[1px] tap-active">
                    <div class="w-full h-full rounded-full bg-slateDark flex items-center justify-center overflow-hidden">
                        <span class="text-xs font-bold tracking-wider text-platinum">AA</span>
                    </div>
                </div>
                <div>
                    <h1 class="text-xs font-medium text-gray-400 tracking-wide uppercase">FIN TEX AI</h1>
                    <div class="flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-emeraldNeon animate-pulse"></span>
                        <span class="text-[10px] text-emeraldNeon/90 tracking-widest uppercase font-semibold">AI Engine Active</span>
                    </div>
                </div>
            </div>
            
            <button class="w-10 h-10 rounded-full glass-card flex items-center justify-center border border-white/5 tap-active relative">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-gray-300">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
                </svg>
                <span class="absolute top-3 right-3 w-1.5 h-1.5 bg-emeraldNeon rounded-full"></span>
            </button>
        </header>

        <!-- MAIN WALLET CARD -->
        <section class="glass-card rounded-3xl p-6 mb-5 relative overflow-hidden shadow-2xl border border-white/10">
            <div class="absolute -right-10 -top-10 w-32 h-32 bg-emeraldNeon/10 rounded-full blur-3xl pointer-events-none"></div>
            
            <div class="flex justify-between items-start mb-4">
                <span class="text-xs font-medium text-gray-400 uppercase tracking-widest">Текущий Баланс</span>
                <span class="text-[10px] bg-white/5 px-2 py-1 rounded-full text-gray-300 border border-white/5">Som (KGS)</span>
            </div>
            
            <div class="flex items-baseline gap-1 mb-6">
                <span class="text-3xl font-bold tracking-tight text-white">25 000</span>
                <span class="text-lg font-medium text-emeraldNeon">KGS</span>
            </div>

            <div class="mt-2">
                <p class="text-[10px] text-gray-500 mb-2 uppercase tracking-wider">Поток средств за неделю</p>
                <div class="h-12 flex items-end gap-2 pt-2 relative">
                    <div class="w-full h-[60%] bg-white/5 rounded-t-sm relative overflow-hidden">
                        <div class="absolute bottom-0 left-0 right-0 h-full bg-gradient-to-t from-emeraldNeon/20 to-transparent"></div>
                    </div>
                    <div class="w-full h-[40%] bg-white/5 rounded-t-sm relative overflow-hidden">
                        <div class="absolute bottom-0 left-0 right-0 h-full bg-gradient-to-t from-emeraldNeon/20 to-transparent"></div>
                    </div>
                    <div class="w-full h-[85%] bg-white/5 rounded-t-sm relative overflow-hidden">
                        <div class="absolute bottom-0 left-0 right-0 h-full bg-gradient-to-t from-emeraldNeon/30 to-transparent"></div>
                    </div>
                    <div class="w-full h-[55%] bg-white/5 rounded-t-sm relative overflow-hidden">
                        <div class="absolute bottom-0 left-0 right-0 h-full bg-gradient-to-t from-emeraldNeon/20 to-transparent"></div>
                    </div>
                    <div class="w-full h-[95%] bg-white/5 rounded-t-sm relative overflow-hidden">
                        <div class="absolute bottom-0 left-0 right-0 h-full bg-gradient-to-t from-emeraldNeon/40 to-transparent"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- AI FINANCIAL KARMA -->
        <section class="glass-card rounded-3xl p-5 mb-5 border border-white/5 relative">
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center gap-1.5">
                    <span class="text-xs font-medium text-gray-400 uppercase tracking-widest">Финансовая Карма AI</span>
                    <span class="text-[9px] text-goldPremium bg-goldPremium/10 px-1.5 py-0.5 rounded border border-goldPremium/20 font-mono">КИБ Ишеним</span>
                </div>
                <span class="text-xs font-bold text-goldPremium tracking-wide">720 <span class="text-[10px] text-gray-400 font-normal">/ 850</span></span>
            </div>

            <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden mb-2.5">
                <div class="h-full bg-gradient-to-r from-goldPremium via-platinum to-emeraldNeon rounded-full" style="width: 82%"></div>
            </div>

            <div class="flex justify-between items-center">
                <p class="text-[11px] text-gray-400">Статус: <span class="text-emeraldNeon font-medium">Отличный рейтинг</span></p>
                <p class="text-[10px] text-gray-500 italic">Тренды указывают на рост на +15 пунктов</p>
            </div>
        </section>

        <!-- QUICK ACTIONS -->
        <section class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="openAIChat()" class="glass-card rounded-2xl py-3.5 px-4 flex items-center justify-center gap-2 border border-white/5 tap-active text-sm font-medium text-gray-200 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-emeraldNeon">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                AI Чат
            </button>
            <button class="glass-card rounded-2xl py-3.5 px-4 flex items-center justify-center gap-2 border border-white/5 tap-active text-sm font-medium text-gray-200 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-goldPremium">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6a7.5 7.5 0 107.5 7.5h-7.5V6z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5H21A7.5 7.5 0 0013.5 3v7.5z" />
                </svg>
                AI Аналитика
            </button>
        </section>

        <!-- RECENT ACTIVITIES -->
        <section class="flex-1 flex flex-col min-h-0">
            <h3 class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-3">Последние операции</h3>
            
            <div class="space-y-2.5 overflow-y-auto pr-1 flex-1">
                <div class="glass-card rounded-2xl overflow-hidden transition-all duration-3xl border border-white/5">
                    <div class="p-4 flex items-center justify-between tap-active">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 rounded-xl bg-white/5 flex items-center justify-center border border-white/5 text-base">🛍️</div>
                            <div>
                                <h4 class="text-xs font-medium text-white">Гипермаркет Глобус</h4>
                                <p class="text-[10px] text-gray-500">Сегодня, 14:32</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-xs font-semibold text-gray-300">-2 450 KGS</span>
                            <p class="text-[9px] text-emeraldNeon font-mono">Продукты</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Floating AI Chat Button -->
    <button onclick="openAIChat()" class="ai-float-chat-btn w-14 h-14 rounded-full glass-card flex items-center justify-center border border-emeraldNeon/50 shadow-lg hover:shadow-emeraldNeon/50 transition tap-active group">
        <div class="absolute inset-0 rounded-full bg-emeraldNeon/10 group-hover:bg-emeraldNeon/20 transition"></div>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 text-emeraldNeon relative z-10">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0M9 12.75h.008v.008H9v-.008zm5.625 0h.008v.008h-.008v-.008zm5.625 0h.008v.008h-.008v-.008M9.75 15h.008v.008H9.75v-.008zm5.625 0h.008v.008h-.008v-.008zm5.625 0h.008v.008h-.008v-.008M7.5 15.75h.008v.008H7.5v-.008zm7.5 0h.008v.008h-.008v-.008zm7.5 0h.008v.008h-.008v-.008" />
        </svg>
    </button>

    <!-- Chat Modal -->
    <iframe id="chatModal" class="chat-modal glass-card hidden" style="border: 1px solid var(--tw-colors-glassBorder);"></iframe>

    <script>
        function openAIChat() {
            const modal = document.getElementById('chatModal');
            modal.classList.remove('hidden');
            modal.src = 'ai-chat.html';
        }

        function closeChat() {
            const modal = document.getElementById('chatModal');
            modal.classList.add('hidden');
        }
    </script>
</body>
</html>
