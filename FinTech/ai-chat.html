<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIN TEX AI - Chat Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        obsidian: '#0D0E11',
                        slateDark: '#16181F',
                        emeraldNeon: '#00E676',
                        goldPremium: '#D4AF37',
                        platinum: '#E5E4E2',
                        glassBorder: 'rgba(255, 255, 255, 0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: linear-gradient(135deg, rgba(22, 24, 31, 0.7) 0%, rgba(13, 14, 17, 0.8) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid var(--tw-colors-glassBorder);
        }
        .message-user {
            animation: slideInRight 0.3s ease-out;
        }
        .message-ai {
            animation: slideInLeft 0.3s ease-out;
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00E676;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="bg-obsidian text-white font-sans antialiased overflow-x-hidden">

    <div class="max-w-2xl mx-auto h-screen px-4 flex flex-col">
        
        <!-- Header -->
        <header class="flex items-center justify-between py-4 border-b border-white/10">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-goldPremium to-emeraldNeon flex items-center justify-center">
                    <span class="text-xs font-bold">AI</span>
                </div>
                <div>
                    <h1 class="text-sm font-bold">FIN TEX AI</h1>
                    <p class="text-xs text-emeraldNeon">Online</p>
                </div>
            </div>
            <button onclick="closeChat()" class="w-8 h-8 rounded-full hover:bg-white/10 flex items-center justify-center">
                ✕
            </button>
        </header>

        <!-- Chat Messages -->
        <div id="chatMessages" class="flex-1 overflow-y-auto py-4 space-y-4 pr-2">
            <div class="message-ai">
                <div class="glass-card rounded-2xl p-4 w-fit max-w-xs">
                    <p class="text-sm text-gray-200">Привет! 👋 Я FIN TEX AI. Я помогу вам разобраться с вашими финансами, проанализирую расходы и дам рекомендации. Что вам интересно?</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="py-4 border-t border-white/10">
            <form id="chatForm" onsubmit="sendMessage(event)" class="flex gap-3">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Напишите сообщение..." 
                    class="flex-1 glass-card rounded-2xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-emeraldNeon/50 transition"
                    maxlength="5000"
                >
                <button 
                    type="submit" 
                    class="w-10 h-10 rounded-full glass-card flex items-center justify-center hover:bg-emeraldNeon/20 transition tap-active"
                >
                    <span class="text-lg">→</span>
                </button>
            </form>
            <div class="flex gap-2 mt-3 flex-wrap">
                <button onclick="quickPrompt('Проанализируй мои расходы')" class="text-xs glass-card px-3 py-2 rounded-full hover:bg-white/10 transition">
                    📊 Анализ расходов
                </button>
                <button onclick="quickPrompt('Дай мне финансовый совет')" class="text-xs glass-card px-3 py-2 rounded-full hover:bg-white/10 transition">
                    💡 Совет
                </button>
                <button onclick="openFileUpload()" class="text-xs glass-card px-3 py-2 rounded-full hover:bg-white/10 transition">
                    📄 Загрузить выписку
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden File Input -->
    <input type="file" id="fileInput" hidden accept=".pdf,.xlsx,.xls" onchange="uploadDocument()">

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let authToken = localStorage.getItem('authToken');
        let conversationHistory = [];

        // Initialize chat
        async function initializeChat() {
            if (!authToken) {
                // Get token for development (in production, use Telegram Mini App auth)
                const response = await fetch(`${API_BASE}/auth/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: 'user_' + Date.now() })
                });
                const data = await response.json();
                authToken = data.token;
                localStorage.setItem('authToken', authToken);
            }
        }

        async function sendMessage(event) {
            event.preventDefault();
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            // Add user message to chat
            addMessageToChat(message, 'user');
            input.value = '';
            conversationHistory.push({ role: 'user', content: message });

            // Show typing indicator
            showTypingIndicator();

            try {
                const response = await fetch(`${API_BASE}/ai/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        message,
                        history: conversationHistory.slice(-5) // Keep last 5 messages for context
                    })
                });

                if (!response.ok) throw new Error('API Error');
                const data = await response.json();

                // Remove typing indicator
                removeTypingIndicator();

                // Add AI response
                addMessageToChat(data.response, 'ai');
                conversationHistory.push({ role: 'assistant', content: data.response });
            } catch (error) {
                removeTypingIndicator();
                addMessageToChat('❌ Ошибка подключения к серверу', 'ai');
            }
        }

        function addMessageToChat(text, role) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message-${role === 'user' ? 'user flex justify-end' : 'ai'}`;
            
            const bgColor = role === 'user' ? 'bg-emeraldNeon/20' : 'glass-card';
            const messageContent = document.createElement('div');
            messageContent.className = `${bgColor} rounded-2xl p-4 w-fit max-w-xs`;
            messageContent.innerHTML = `<p class="text-sm text-gray-200 whitespace-pre-wrap">${escapeHtml(text)}</p>`;
            
            messageDiv.appendChild(messageContent);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTypingIndicator() {
            const messagesDiv = document.getElementById('chatMessages');
            const typeDiv = document.createElement('div');
            typeDiv.id = 'typingIndicator';
            typeDiv.className = 'message-ai';
            typeDiv.innerHTML = `
                <div class="glass-card rounded-2xl p-4">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(typeDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function quickPrompt(prompt) {
            document.getElementById('messageInput').value = prompt;
            sendMessage({ preventDefault: () => {} });
        }

        function openFileUpload() {
            document.getElementById('fileInput').click();
        }

        async function uploadDocument() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;

            showTypingIndicator();
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`${API_BASE}/documents/process-statement`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: formData
                });

                const data = await response.json();
                removeTypingIndicator();

                if (data.success) {
                    const analysis = data.data.analysis || JSON.stringify(data.data);
                    addMessageToChat(`📄 Документ обработан:\n\n${analysis}`, 'ai');
                    conversationHistory.push({ role: 'assistant', content: analysis });
                } else {
                    addMessageToChat('❌ Ошибка обработки документа', 'ai');
                }
            } catch (error) {
                removeTypingIndicator();
                addMessageToChat('❌ Ошибка загрузки документа', 'ai');
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function closeChat() {
            window.close();
        }

        // Initialize on page load
        window.addEventListener('load', initializeChat);
    </script>

</body>
</html>
